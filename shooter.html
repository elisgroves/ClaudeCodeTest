<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PIXEL SIEGE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }
    canvas {
      display: block;
      border: 2px solid #00FF41;
      box-shadow: 0 0 30px #00FF41, 0 0 60px #003300;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const W = 800, H = 600, GRID = 40;
const C = {
  bg:      '#0A0A0A',
  grid:    '#141414',
  player:  '#00FF41',
  pBullet: '#FFFF00',
  chaser:  '#FF2200',
  zigzag:  '#00CCFF',
  turret:  '#FF00FF',
  eBullet: '#FF00FF',
  hud:     '#00FF41',
  white:   '#FFFFFF',
};

// ─── Canvas Setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
const mouse = { x: W/2, y: H/2, down: false };
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))
    e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
});
canvas.addEventListener('mousedown', () => { mouse.down = true; });
canvas.addEventListener('mouseup',   () => { mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ─── Utilities ────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function dist2(a, b) { const dx=a.x-b.x, dy=a.y-b.y; return dx*dx+dy*dy; }
function circlesOverlap(a, b) { return dist2(a,b) <= (a.radius+b.radius)**2; }
function randEdge(margin=50) {
  const side = Math.floor(Math.random()*4);
  if (side===0) return { x: Math.random()*W, y: -margin };
  if (side===1) return { x: W+margin, y: Math.random()*H };
  if (side===2) return { x: Math.random()*W, y: H+margin };
  return { x: -margin, y: Math.random()*H };
}
function pad6(n) { return Math.floor(n).toString().padStart(6,'0'); }

// ─── Particles ────────────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, count, color, sMin, sMax, lMin, lMax) {
  for (let i=0; i<count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = sMin + Math.random()*(sMax-sMin);
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      color,
      life: lMin + Math.random()*(lMax-lMin),
      maxLife: lMin + Math.random()*(lMax-lMin),
      size: 3 + Math.random()*3,
    });
  }
}
function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * (dt/1000);
    p.y += p.vy * (dt/1000);
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
}
function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 4;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Bullets ─────────────────────────────────────────────────────────────────
let bullets = [];
function spawnPlayerBullet(x, y, angle) {
  const speed = 500;
  bullets.push({
    x: x + Math.cos(angle)*16,
    y: y + Math.sin(angle)*16,
    vx: Math.cos(angle)*speed,
    vy: Math.sin(angle)*speed,
    radius: 4,
    team: 'player',
    damage: 1,
    lifetime: 2000,
    trail: [],
    alive: true,
  });
}
function spawnEnemyBullet(x, y, angle) {
  const speed = 220;
  bullets.push({
    x, y,
    vx: Math.cos(angle)*speed,
    vy: Math.sin(angle)*speed,
    radius: 5,
    team: 'enemy',
    damage: 1,
    lifetime: 3000,
    trail: [],
    alive: true,
  });
}
function updateBullets(dt) {
  for (const b of bullets) {
    b.trail.unshift({ x: b.x, y: b.y });
    if (b.trail.length > 4) b.trail.pop();
    b.x += b.vx * (dt/1000);
    b.y += b.vy * (dt/1000);
    b.lifetime -= dt;
    if (b.lifetime <= 0 || b.x<-20 || b.x>W+20 || b.y<-20 || b.y>H+20)
      b.alive = false;
  }
  bullets = bullets.filter(b => b.alive);
}
function drawBullets() {
  for (const b of bullets) {
    const col = b.team === 'player' ? C.pBullet : C.eBullet;
    // trail
    for (let i=0; i<b.trail.length; i++) {
      const alpha = (b.trail.length-i) / (b.trail.length+1) * 0.5;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(b.trail[i].x, b.trail[i].y, b.radius * 0.6, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    // bullet
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = col;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = C.white;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius*0.35, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Player ───────────────────────────────────────────────────────────────────
const player = {
  x: W/2, y: H/2,
  radius: 12,
  speed: 200,
  angle: 0,
  health: 3,
  maxHealth: 3,
  shootCooldown: 0,
  shootRate: 220,
  invTimer: 0,
  alive: true,
};
function resetPlayer() {
  player.x = W/2; player.y = H/2;
  player.health = 3;
  player.invTimer = 0;
  player.alive = true;
  player.shootCooldown = 0;
}
function updatePlayer(dt) {
  if (!player.alive) return;
  let vx=0, vy=0;
  if (keys['KeyW']||keys['ArrowUp'])    vy -= 1;
  if (keys['KeyS']||keys['ArrowDown'])  vy += 1;
  if (keys['KeyA']||keys['ArrowLeft'])  vx -= 1;
  if (keys['KeyD']||keys['ArrowRight']) vx += 1;
  if (vx!==0 && vy!==0) { vx*=0.707; vy*=0.707; }
  player.x = clamp(player.x + vx*player.speed*(dt/1000), player.radius, W-player.radius);
  player.y = clamp(player.y + vy*player.speed*(dt/1000), player.radius, H-player.radius);
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  player.shootCooldown -= dt;
  if (mouse.down && player.shootCooldown <= 0) {
    spawnPlayerBullet(player.x, player.y, player.angle);
    player.shootCooldown = player.shootRate;
    spawnParticles(
      player.x + Math.cos(player.angle)*16,
      player.y + Math.sin(player.angle)*16,
      4, C.pBullet, 30, 120, 60, 150
    );
  }
  if (player.invTimer > 0) player.invTimer -= dt;
}
function drawPlayer() {
  if (!player.alive) return;
  if (player.invTimer > 0 && Math.floor(player.invTimer/100)%2===1) return;
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);

  ctx.shadowBlur = 14;
  ctx.shadowColor = C.player;

  // engine flame (behind ship, only when moving)
  const moving = keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD']||
                 keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight'];
  if (moving) {
    const flicker = 5 + Math.random()*5;
    const grad = ctx.createLinearGradient(-12, 0, -12-flicker, 0);
    grad.addColorStop(0, 'rgba(255,160,0,0.9)');
    grad.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-10, -4);
    ctx.lineTo(-10-flicker, 0);
    ctx.lineTo(-10,  4);
    ctx.closePath();
    ctx.fill();
  }

  // ship body — arrow/wedge pointing right (toward aim direction)
  ctx.fillStyle = '#00CC33';
  ctx.strokeStyle = C.player;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo( 14,  0);   // nose
  ctx.lineTo( -8,  9);   // back-left wing tip
  ctx.lineTo( -4,  0);   // tail notch
  ctx.lineTo( -8, -9);   // back-right wing tip
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // cockpit window
  ctx.fillStyle = '#AAFFCC';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.ellipse(4, 0, 4, 3, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ─── Enemies ──────────────────────────────────────────────────────────────────
let enemies = [];

class Chaser {
  constructor(x, y, speed) {
    this.x=x; this.y=y; this.vx=0; this.vy=0;
    this.radius=10; this.health=1; this.maxHealth=1;
    this.speed=speed; this.scoreValue=100;
    this.type='chaser'; this.alive=true;
    this.angle=0;
  }
  update(dt) {
    this.angle = Math.atan2(player.y-this.y, player.x-this.x);
    this.vx = Math.cos(this.angle)*this.speed;
    this.vy = Math.sin(this.angle)*this.speed;
    this.x += this.vx*(dt/1000);
    this.y += this.vy*(dt/1000);
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.shadowBlur = 8;
    ctx.shadowColor = C.chaser;
    ctx.fillStyle = C.chaser;
    ctx.strokeStyle = '#FF6644';
    ctx.lineWidth = 2;
    ctx.fillRect(-9,-9,18,18);
    ctx.strokeRect(-9,-9,18,18);
    ctx.restore();
  }
}

class Zigzagger {
  constructor(x, y, speed) {
    this.x=x; this.y=y; this.vx=0; this.vy=0;
    this.radius=9; this.health=1; this.maxHealth=1;
    this.speed=speed; this.zigSpeed=60; this.zigTimer=Math.random()*1000;
    this.scoreValue=200; this.type='zigzag'; this.alive=true;
    this.angle=0;
  }
  update(dt) {
    this.zigTimer += dt;
    this.angle = Math.atan2(player.y-this.y, player.x-this.x);
    const perp = this.angle + Math.PI/2;
    const lateral = Math.sin(this.zigTimer*0.003)*this.zigSpeed;
    this.vx = Math.cos(this.angle)*this.speed + Math.cos(perp)*lateral;
    this.vy = Math.sin(this.angle)*this.speed + Math.sin(perp)*lateral;
    this.x += this.vx*(dt/1000);
    this.y += this.vy*(dt/1000);
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.shadowBlur = 8;
    ctx.shadowColor = C.zigzag;
    ctx.fillStyle = C.zigzag;
    ctx.strokeStyle = C.white;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-9, 9);
    ctx.lineTo(-9,-9);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

class Turret {
  constructor(x, y) {
    this.x=x; this.y=y; this.vx=0; this.vy=0;
    this.radius=14; this.health=3; this.maxHealth=3;
    this.speed=0; this.scoreValue=500;
    this.type='turret'; this.alive=true;
    this.angle=0; this.shootCooldown=2000;
    this.hitFlash=0;
  }
  update(dt) {
    this.angle = Math.atan2(player.y-this.y, player.x-this.x);
    this.shootCooldown -= dt;
    if (this.shootCooldown <= 0) {
      spawnEnemyBullet(this.x, this.y, this.angle);
      this.shootCooldown = 2000;
    }
    if (this.hitFlash > 0) this.hitFlash -= dt;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    // octagon body
    ctx.shadowBlur = 10;
    ctx.shadowColor = C.turret;
    ctx.fillStyle = this.hitFlash > 0 ? C.white : '#330033';
    ctx.strokeStyle = C.turret;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i=0; i<8; i++) {
      const a = (i/8)*Math.PI*2 - Math.PI/8;
      i===0 ? ctx.moveTo(Math.cos(a)*this.radius, Math.sin(a)*this.radius)
             : ctx.lineTo(Math.cos(a)*this.radius, Math.sin(a)*this.radius);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // barrel
    ctx.rotate(this.angle);
    ctx.fillStyle = C.turret;
    ctx.fillRect(0, -3, this.radius+8, 6);
    ctx.restore();
    // health bar
    const bw = 30, bh = 4;
    ctx.fillStyle = '#333';
    ctx.fillRect(this.x-bw/2, this.y-this.radius-10, bw, bh);
    ctx.fillStyle = C.turret;
    ctx.fillRect(this.x-bw/2, this.y-this.radius-10, bw*(this.health/this.maxHealth), bh);
  }
}

// ─── Levels ───────────────────────────────────────────────────────────────────
const LEVELS = [
  {
    num: 1, bg: '#0A0A0A', gridColor: '#141414',
    message: 'SECTOR 1',
    waves: [
      { delay:    0, type:'chaser',  count:5, speed:80  },
      { delay: 6000, type:'chaser',  count:8, speed:90  },
    ]
  },
  {
    num: 2, bg: '#0A0A0F', gridColor: '#141420',
    message: 'SECTOR 2',
    waves: [
      { delay:    0, type:'chaser',  count:6, speed:95  },
      { delay: 4000, type:'zigzag',  count:4, speed:130 },
      { delay: 9000, type:'turret',  count:2, speed:0   },
    ]
  },
  {
    num: 3, bg: '#0F0A0A', gridColor: '#201414',
    message: 'SECTOR 3 — FINAL STAND',
    waves: [
      { delay:    0, type:'chaser',  count:8,  speed:105 },
      { delay: 3000, type:'zigzag',  count:5,  speed:145 },
      { delay: 6000, type:'turret',  count:3,  speed:0   },
      { delay:10000, type:'zigzag',  count:8,  speed:160 },
      { delay:14000, type:'chaser',  count:10, speed:115 },
    ]
  },
];

let currentLevelIdx = 0;
let waveTimer = 0;
let wavesSpawned = false;

function loadLevel(idx) {
  const lvl = LEVELS[idx];
  enemies = [];
  bullets = [];
  particles = [];
  waveTimer = 0;
  wavesSpawned = false;
  for (const w of lvl.waves) w.spawned = false;
  // reset player position but keep health/score
  player.x = W/2; player.y = H/2;
  player.invTimer = 1000; // brief grace
}

function spawnWave(wave) {
  for (let i=0; i<wave.count; i++) {
    let pos;
    let attempts = 0;
    do {
      pos = randEdge(60);
      attempts++;
    } while (dist2(pos, player) < 150*150 && attempts < 20);

    if (wave.type==='chaser')  enemies.push(new Chaser(pos.x, pos.y, wave.speed));
    if (wave.type==='zigzag')  enemies.push(new Zigzagger(pos.x, pos.y, wave.speed));
    if (wave.type==='turret') {
      // turrets spawn slightly inside canvas
      const tx = clamp(pos.x, 80, W-80);
      const ty = clamp(pos.y, 80, H-80);
      enemies.push(new Turret(tx, ty));
    }
  }
}

function updateWaves(dt) {
  const lvl = LEVELS[currentLevelIdx];
  waveTimer += dt;
  let allSpawned = true;
  for (const w of lvl.waves) {
    if (!w.spawned && waveTimer >= w.delay) {
      spawnWave(w);
      w.spawned = true;
    }
    if (!w.spawned) allSpawned = false;
  }
  wavesSpawned = allSpawned;
}

// ─── Collision ────────────────────────────────────────────────────────────────
function checkCollisions() {
  // player bullets vs enemies
  for (const b of bullets) {
    if (b.team !== 'player' || !b.alive) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (circlesOverlap(b, e)) {
        b.alive = false;
        e.health--;
        if (e.type==='turret') e.hitFlash = 120;
        if (e.health <= 0) {
          e.alive = false;
          score += e.scoreValue;
          spawnParticles(e.x, e.y, 12,
            e.type==='chaser' ? C.chaser : e.type==='zigzag' ? C.zigzag : C.turret,
            30, 160, 200, 500
          );
          flashTimer = 80;
        }
        break;
      }
    }
  }
  // enemy bullets vs player
  if (player.alive && player.invTimer <= 0) {
    for (const b of bullets) {
      if (b.team !== 'enemy' || !b.alive) continue;
      if (circlesOverlap(b, player)) {
        b.alive = false;
        hitPlayer();
      }
    }
  }
  // enemy contact vs player
  if (player.alive && player.invTimer <= 0) {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (circlesOverlap(e, player)) {
        hitPlayer();
        break;
      }
    }
  }
}

function hitPlayer() {
  player.health--;
  player.invTimer = 1500;
  shakeTimer = 300; shakeMag = 8;
  spawnParticles(player.x, player.y, 8, C.player, 40, 120, 200, 400);
  flashTimer = 60;
  if (player.health <= 0) {
    player.alive = false;
    gameState = 'GAME_OVER';
  }
}

// ─── Game State ───────────────────────────────────────────────────────────────
let gameState = 'START'; // START | PLAYING | LEVEL_COMPLETE | GAME_OVER | VICTORY
let score = 0;
let blinkTimer = 0;
let shakeTimer = 0, shakeMag = 0;
let flashTimer = 0;
let levelCompleteTimer = 0;

function startGame() {
  score = 0;
  currentLevelIdx = 0;
  resetPlayer();
  loadLevel(0);
  gameState = 'PLAYING';
}

function update(dt) {
  blinkTimer += dt;
  if (flashTimer > 0) flashTimer -= dt;
  if (shakeTimer > 0) { shakeTimer -= dt; shakeMag *= 0.9; }

  if (gameState === 'PLAYING') {
    updateWaves(dt);
    updatePlayer(dt);
    for (const e of enemies) e.update(dt);
    updateBullets(dt);
    updateParticles(dt);
    enemies = enemies.filter(e => e.alive);
    checkCollisions();

    if (wavesSpawned && enemies.length === 0 && gameState === 'PLAYING') {
      levelCompleteTimer = 0;
      gameState = 'LEVEL_COMPLETE';
    }
  } else if (gameState === 'LEVEL_COMPLETE') {
    levelCompleteTimer += dt;
    updateParticles(dt);
  }
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function drawBackground() {
  const lvl = LEVELS[Math.min(currentLevelIdx, LEVELS.length-1)];
  ctx.fillStyle = lvl.bg;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = lvl.gridColor;
  ctx.lineWidth = 0.5;
  for (let x=0; x<=W; x+=GRID) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<=H; y+=GRID) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function drawScanlines() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  for (let y=0; y<H; y+=3) ctx.fillRect(0, y, W, 1);
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  ctx.font = 'bold 18px "Courier New", monospace';
  ctx.fillStyle = C.hud;
  ctx.shadowBlur = 6; ctx.shadowColor = C.hud;
  ctx.fillText('SCORE: ' + pad6(score), 14, 28);
  // sector label center
  const lvl = LEVELS[Math.min(currentLevelIdx, LEVELS.length-1)];
  ctx.font = '13px "Courier New", monospace';
  ctx.fillStyle = C.white;
  ctx.shadowColor = C.white;
  ctx.textAlign = 'center';
  ctx.fillText(lvl.message, W/2, 22);
  ctx.textAlign = 'left';
  // health hearts
  for (let i=0; i<player.maxHealth; i++) {
    ctx.fillStyle = i < player.health ? '#FF3333' : '#331111';
    ctx.shadowColor = '#FF3333';
    ctx.font = '20px sans-serif';
    ctx.fillText('♥', W - 30 - i*28, 28);
  }
  ctx.restore();
}

function drawCrosshair() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 4; ctx.shadowColor = C.white;
  const s = 8;
  ctx.beginPath();
  ctx.moveTo(mouse.x-s, mouse.y); ctx.lineTo(mouse.x+s, mouse.y);
  ctx.moveTo(mouse.x, mouse.y-s); ctx.lineTo(mouse.x, mouse.y+s);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 4, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawStartScreen() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);
  // grid lines subtle
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 0.5;
  for (let x=0; x<=W; x+=GRID) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<=H; y+=GRID) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  ctx.save();
  ctx.textAlign = 'center';
  // title
  ctx.font = 'bold 64px "Courier New", monospace';
  ctx.fillStyle = C.hud;
  ctx.shadowBlur = 20; ctx.shadowColor = C.hud;
  ctx.fillText('PIXEL SIEGE', W/2, H/2 - 80);
  // subtitle
  ctx.font = '16px "Courier New", monospace';
  ctx.fillStyle = C.white;
  ctx.shadowColor = C.white; ctx.shadowBlur = 6;
  ctx.fillText('TOP-DOWN SHOOTER', W/2, H/2 - 40);
  // blink
  if (Math.floor(blinkTimer/500)%2===0) {
    ctx.font = 'bold 20px "Courier New", monospace';
    ctx.fillStyle = C.hud;
    ctx.shadowColor = C.hud; ctx.shadowBlur = 10;
    ctx.fillText('PRESS ENTER TO BEGIN', W/2, H/2 + 20);
  }
  // controls
  ctx.font = '13px "Courier New", monospace';
  ctx.fillStyle = '#666';
  ctx.shadowBlur = 0;
  ctx.fillText('WASD: MOVE   |   MOUSE: AIM   |   CLICK: FIRE', W/2, H/2 + 70);
  ctx.fillText('3 SECTORS TO CONQUER', W/2, H/2 + 95);
  ctx.restore();
}

function drawLevelCompleteScreen() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 42px "Courier New", monospace';
  ctx.fillStyle = C.hud;
  ctx.shadowBlur = 16; ctx.shadowColor = C.hud;
  ctx.fillText('SECTOR CLEAR', W/2, H/2 - 50);
  ctx.font = '22px "Courier New", monospace';
  ctx.fillStyle = C.white;
  ctx.shadowColor = C.white; ctx.shadowBlur = 6;
  ctx.fillText('SCORE: ' + pad6(score), W/2, H/2);
  if (Math.floor(blinkTimer/500)%2===0) {
    ctx.font = 'bold 16px "Courier New", monospace';
    ctx.fillStyle = C.hud;
    ctx.shadowColor = C.hud; ctx.shadowBlur = 8;
    ctx.fillText('PRESS ENTER FOR NEXT SECTOR', W/2, H/2 + 50);
  }
  ctx.restore();
}

function drawGameOverScreen() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 60px "Courier New", monospace';
  ctx.fillStyle = C.chaser;
  ctx.shadowBlur = 20; ctx.shadowColor = C.chaser;
  ctx.fillText('GAME OVER', W/2, H/2 - 60);
  ctx.font = '24px "Courier New", monospace';
  ctx.fillStyle = C.white;
  ctx.shadowColor = C.white; ctx.shadowBlur = 6;
  ctx.fillText('FINAL SCORE: ' + pad6(score), W/2, H/2);
  if (Math.floor(blinkTimer/500)%2===0) {
    ctx.font = 'bold 16px "Courier New", monospace';
    ctx.fillStyle = C.white;
    ctx.fillText('PRESS R TO RESTART', W/2, H/2 + 55);
  }
  ctx.restore();
}

function drawVictoryScreen() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 46px "Courier New", monospace';
  ctx.fillStyle = C.hud;
  ctx.shadowBlur = 20; ctx.shadowColor = C.hud;
  ctx.fillText('MISSION COMPLETE', W/2, H/2 - 70);
  ctx.font = '24px "Courier New", monospace';
  ctx.fillStyle = C.pBullet;
  ctx.shadowColor = C.pBullet; ctx.shadowBlur = 8;
  ctx.fillText('FINAL SCORE: ' + pad6(score), W/2, H/2 - 10);
  ctx.font = '18px "Courier New", monospace';
  ctx.fillStyle = C.white;
  ctx.shadowColor = C.white;
  ctx.fillText('YOU ARE A LEGEND', W/2, H/2 + 35);
  if (Math.floor(blinkTimer/500)%2===0) {
    ctx.font = '14px "Courier New", monospace';
    ctx.fillStyle = '#888';
    ctx.shadowBlur = 0;
    ctx.fillText('PRESS R TO PLAY AGAIN', W/2, H/2 + 80);
  }
  ctx.restore();
}

function draw() {
  // screen shake
  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate(
      (Math.random()-0.5)*shakeMag,
      (Math.random()-0.5)*shakeMag
    );
  }

  if (gameState === 'START') {
    drawStartScreen();
  } else if (gameState === 'PLAYING' || gameState === 'LEVEL_COMPLETE') {
    drawBackground();
    drawParticles();
    drawBullets();
    for (const e of enemies) e.draw();
    drawPlayer();
    // hit flash overlay
    if (flashTimer > 0) {
      ctx.save();
      ctx.fillStyle = `rgba(255,255,255,${(flashTimer/100)*0.25})`;
      ctx.fillRect(0,0,W,H);
      ctx.restore();
    }
    drawScanlines();
    drawHUD();
    if (gameState === 'LEVEL_COMPLETE') drawLevelCompleteScreen();
    drawCrosshair();
  } else if (gameState === 'GAME_OVER') {
    drawBackground();
    drawParticles();
    drawScanlines();
    drawGameOverScreen();
    drawCrosshair();
  } else if (gameState === 'VICTORY') {
    drawBackground();
    drawParticles();
    drawScanlines();
    drawVictoryScreen();
    drawCrosshair();
  }

  ctx.restore();
}

// ─── Key Handling for State Transitions ──────────────────────────────────────
window.addEventListener('keydown', e => {
  if (gameState === 'START' && e.code === 'Enter') {
    startGame();
  }
  if (gameState === 'LEVEL_COMPLETE' && e.code === 'Enter') {
    currentLevelIdx++;
    if (currentLevelIdx >= LEVELS.length) {
      gameState = 'VICTORY';
    } else {
      loadLevel(currentLevelIdx);
      gameState = 'PLAYING';
    }
  }
  if ((gameState === 'GAME_OVER' || gameState === 'VICTORY') && e.code === 'KeyR') {
    startGame();
  }
});

// ─── Game Loop ────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min(ts - lastTime, 50); // milliseconds, capped at 50ms
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
